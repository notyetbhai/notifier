<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VAULT_SCRIPTORIUM | Secure Access{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#22262f",
              "outline": "#73757d",
              "primary-fixed": "#00e3fd",
              "surface-dim": "#0b0e14",
              "tertiary": "#ff6e84",
              "on-surface": "#ecedf6",
              "surface-container": "#161a21",
              "primary": "#81ecff",
              "surface-container-low": "#10131a",
              "error": "#ff716c",
              "secondary": "#9f8eff",
              "surface-variant": "#22262f",
              "primary-dim": "#00d4ec",
              "surface-bright": "#282c36",
              "surface": "#0b0e14",
              "on-surface-variant": "#a9abb3",
              "outline-variant": "#45484f"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .security-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.2); }
        }
        body {
            background-color: #0b0e14;
            background-image: radial-gradient(circle at 2px 2px, rgba(129, 236, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
            color: #ecedf6;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #1c2028; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #81ecff; }
        
        .neon-glow-primary {
            text-shadow: 0 0 10px rgba(129, 236, 255, 0.5), 0 0 20px rgba(129, 236, 255, 0.2);
        }
    </style>
</head>
<body class="selection:bg-primary/30 min-h-screen">
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="fixed top-4 right-4 z-[100] flex flex-col gap-2">
        {% for category, message in messages %}
          <div class="p-4 bg-surface-container-highest border-l-4 rounded shadow-lg text-sm text-on-surface
             {% if category == 'danger' %} border-error text-error {% else %} border-primary text-primary {% endif %}">
              {{ message }}
          </div>
        {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}
    {% endblock %}
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
